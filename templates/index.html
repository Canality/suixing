<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随行 SuiXing — 本地生活管家</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;background:radial-gradient(1px 1px at 20px 30px,#fff3,transparent),radial-gradient(1px 1px at 40px 70px,#fff2,transparent),radial-gradient(1px 1px at 90px 40px,#fff3,transparent),radial-gradient(1px 1px at 130px 80px,#fff1,transparent),radial-gradient(2px 2px at 200px 50px,#fff2,transparent);background-size:250px 250px}
.container{display:flex;gap:32px;align-items:center;z-index:1;padding:20px}

/* Phone Frame */
.phone-frame{position:relative;width:390px;height:780px;border-radius:48px;background:#1a1a1a;padding:14px;box-shadow:0 0 0 2px #333,0 0 0 6px #1a1a1a,0 0 0 8px #444,0 24px 80px rgba(0,0,0,.6),inset 0 0 4px rgba(255,255,255,.05)}
.phone-notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:120px;height:30px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:10}
.phone-screen{width:100%;height:100%;border-radius:36px;overflow:hidden;display:flex;flex-direction:column;background:#f0f2f5;position:relative}

/* Chat Header */
.chat-header{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;z-index:2}
.chat-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#f97316);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.chat-header-info{flex:1}
.chat-header-name{font-size:16px;font-weight:600}
.chat-header-status{font-size:11px;opacity:.8;display:flex;align-items:center;gap:4px}
.chat-header-status .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Messages */
.chat-body{flex:1;overflow-y:auto;padding:12px 16px;background:#e8e8ed;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:#c0c0c0;border-radius:2px}

.msg{max-width:82%;padding:10px 14px;font-size:14px;line-height:1.55;word-break:break-word;animation:msgIn .25s ease-out;position:relative}
.msg.agent{background:#fff;align-self:flex-start;border-radius:4px 16px 16px 16px;box-shadow:0 1px 2px rgba(0,0,0,.06);color:#1a1a1a}
.msg.user{background:#6366f1;color:#fff;align-self:flex-end;border-radius:16px 16px 4px 16px;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.msg.system{background:transparent;align-self:center;font-size:12px;color:#999;text-align:center;max-width:90%}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Typing */
.typing{display:flex;align-items:center;gap:6px;padding:12px 16px;background:#fff;border-radius:4px 16px 16px 16px;align-self:flex-start;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.typing span{width:7px;height:7px;border-radius:50%;background:#c0c0c0;animation:typeBounce 1.3s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typeBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

/* Rich Card */
.card{background:#fff;border-radius:12px;overflow:hidden;margin:4px 0;box-shadow:0 2px 8px rgba(0,0,0,.06);font-size:13px}
.card-img{height:120px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff}
.card-body{padding:10px 12px}
.card-title{font-weight:600;font-size:14px;margin-bottom:2px}
.card-sub{color:#888;font-size:11px;margin-bottom:6px}
.card-row{display:flex;gap:12px;font-size:11px;color:#666;margin-bottom:2px}
.card-row .label{color:#999}
.card-source{font-size:10px;color:#6366f1;margin-top:4px}

/* Source tag */
.src-tag{display:inline-block;font-size:10px;color:#6366f1;background:#eef2ff;padding:1px 6px;border-radius:4px;margin-left:2px;vertical-align:middle}

/* Quick actions */
.quick-row{display:flex;gap:6px;padding:10px 16px;background:#fff;border-top:1px solid #e5e5ea;overflow-x:auto;flex-shrink:0}
.quick-row::-webkit-scrollbar{height:0}
.quick-btn{font-size:12px;padding:7px 14px;border-radius:18px;border:1.5px solid #e5e5ea;background:#fff;color:#6366f1;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.quick-btn:hover{background:#6366f1;color:#fff;border-color:#6366f1}

/* Input */
.input-row{background:#fff;padding:10px 14px 14px;display:flex;gap:8px;border-top:1px solid #e5e5ea;flex-shrink:0}
.input-row input{flex:1;border:1.5px solid #e5e5ea;border-radius:22px;padding:10px 16px;font-size:14px;outline:none;background:#f8f8f8;transition:border .15s}
.input-row input:focus{border-color:#6366f1;background:#fff}
.input-row button{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:50%;width:42px;height:42px;font-size:16px;cursor:pointer;flex-shrink:0;transition:transform .15s}
.input-row button:hover{transform:scale(1.1)}
.input-row button:disabled{opacity:.5;transform:none}

/* Tech Panel */
.tech-panel{background:#0d1117;color:#c9d1d9;border-radius:16px;width:330px;padding:18px;font-family:'SF Mono',Consolas,monospace;font-size:12px;max-height:780px;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.tech-panel h3{color:#58a6ff;margin-bottom:14px;font-size:14px;display:flex;align-items:center;gap:8px}
.tech-panel h3 .live{width:8px;height:8px;border-radius:50%;background:#f85149;animation:pulse 1s infinite}
.tech-event{padding:6px 8px;border-radius:4px;margin-bottom:4px;border-left:3px solid transparent;animation:fadeTech .3s}
.tech-event.thinking{border-left-color:#58a6ff;background:#1f6feb11}
.tech-event.tool_call{border-left-color:#d29922;background:#d2992211}
.tech-event.tool_result{border-left-color:#3fb950;background:#23863611}
.tech-event.reply{border-left-color:#a371f7;background:#a371f711}
.tech-event.error{border-left-color:#f85149;background:#f8514911}
.tech-event .time{color:#484f58;font-size:10px}
.tech-event .tag{display:inline-block;padding:1px 5px;border-radius:2px;font-size:10px;margin-right:4px;font-weight:600}
.tech-event .tag.th{background:#1f6feb33;color:#58a6ff}
.tech-event .tag.tc{background:#d2992233;color:#d29922}
.tech-event .tag.tr{background:#23863633;color:#3fb950}
.tech-event .tag.rp{background:#a371f733;color:#a371f7}
.tech-event .desc{color:#8b949e;margin-top:2px;font-size:11px;word-break:break-all}
@keyframes fadeTech{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}

/* Toast notifications */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1a1a2e;color:#fff;border-left:4px solid #3fb950;padding:14px 20px;border-radius:8px;font-size:13px;max-width:360px;animation:slideIn .3s ease;pointer-events:auto;box-shadow:0 8px 32px rgba(0,0,0,.4);cursor:pointer;line-height:1.5}
.toast.error{border-left-color:#f85149}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}

/* Watch badge */
.watch-badge{background:#fef3c7;color:#92400e;font-size:11px;padding:6px 16px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #fde68a;cursor:pointer;transition:background .15s}
.watch-badge:hover{background:#fef08a}
.watch-badge .wdot{width:6px;height:6px;border-radius:50%;background:#f59e0b;animation:pulse 1.5s infinite}
.watch-badge.empty{background:#f0fdf4;color:#166534;border-bottom-color:#bbf7d0}
.watch-badge.empty .wdot{background:#22c55e}

/* Watch events in tech panel */
.tech-event.watch_created{border-left-color:#f59e0b;background:#f59e0b11}
.tech-event.watch_triggered{border-left-color:#3fb950;background:#23863611}
.tech-event.watch_triggered_raw{border-left-color:#d29922;background:#d2992211}
.tag.wc{background:#f59e0b33;color:#f59e0b}
.tag.wt{background:#23863633;color:#3fb950}
.tag.wa{background:#d2992233;color:#d29922}

/* Action card in chat */
.action-card{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px;margin:4px 0;font-size:13px}
.action-card .ac-title{font-weight:600;margin-bottom:4px}
.action-card .ac-body{color:#64748b;font-size:12px;margin-bottom:8px}
.action-card .ac-btns{display:flex;gap:6px;flex-wrap:wrap}
.action-card .ac-btn{font-size:11px;padding:6px 14px;border-radius:16px;border:1.5px solid #6366f1;background:#fff;color:#6366f1;cursor:pointer;transition:all .15s;white-space:nowrap}
.action-card .ac-btn:hover{background:#6366f1;color:#fff}
.action-card .ac-btn.primary{background:#6366f1;color:#fff}
.action-card .ac-btn.primary:hover{background:#4f46e5}
</style>
</head>
<body>
<div class="stars"></div>
<div class="toast-container" id="toastContainer"></div>
<div class="container">
<!-- Phone -->
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="chat-header">
      <div class="chat-avatar">🦉</div>
      <div class="chat-header-info">
        <div class="chat-header-name">随行 SuiXing</div>
        <div class="chat-header-status"><span class="dot"></span>在线 · 7x24</div>
      </div>
    </div>
    <div class="watch-badge empty" id="watchBadge" style="display:none" onclick="toggleWatchDetail()">
      <span class="wdot"></span> <span id="watchBadgeText">无活跃监控</span>
    </div>
    <div class="quick-row" id="quickRow">
      <button class="quick-btn" onclick="ask('我饿了，想吃川菜')">🍜 想吃川菜</button>
      <button class="quick-btn" onclick="ask('我要去798艺术区，怎么走')">🚗 去798</button>
      <button class="quick-btn" onclick="ask('周末有什么好玩的推荐')">🎬 周末活动</button>
      <button class="quick-btn" onclick="ask('今天天气怎么样')">🌤️ 查天气</button>
      <button class="quick-btn" onclick="ask('帮我推荐火锅，要排队少的')">🍲 火锅</button>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="msg agent">
        你好！我是<strong>随行</strong> 🦉<br>
        你的本地生活管家，7x24小时在线。<br><br>
        我可以帮你：<br>
        🍜 <strong>找餐厅</strong> · 搜索附近美食 · 取号排队<br>
        🚗 <strong>规划出行</strong> · 路线导航 · 打车预估<br>
        🎬 <strong>推荐活动</strong> · 查天气 · 周末好去处<br><br>
        试试下面的快捷按钮 👇<br>
        <span class="src-tag">随行 Demo v2.0</span>
      </div>
    </div>
    <div class="input-row">
      <input id="msgInput" placeholder="说点什么..." onkeydown="if(event.key==='Enter')ask()" autofocus>
      <button id="sendBtn" onclick="ask()">➤</button>
    </div>
  </div>
</div>

<!-- Tech Panel -->
<div class="tech-panel" id="techPanel">
  <h3><span class="live"></span> Agent 思考过程</h3>
  <div id="techEvents"><div class="tech-event thinking"><span class="time">--</span> <span class="tag th">INFO</span><span class="desc">等待用户输入...</span></div></div>
</div>
</div>

<script>
const chatBody = document.getElementById('chatBody');
const techEvents = document.getElementById('techEvents');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const SID = 'ui_' + Date.now();
let typingEl = null;

function showTyping() {
  hideTyping();
  const el = document.createElement('div'); el.className = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  chatBody.appendChild(el); chatBody.scrollTop = chatBody.scrollHeight;
  typingEl = el;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function addMsg(text, role) {
  hideTyping();
  const div = document.createElement('div'); div.className = 'msg ' + role;
  if (role === 'agent') {
    // Step 0: Extract URL from HTML <a> tags → "text URL", then strip all raw HTML
    text = text.replace(/<a\s+(?:[^>]*?\s+)?href="([^"]*)"[^>]*>([^<]*)<\/a>/gi, '$2 $1');
    text = text.replace(/<[^>]*>/g, '');
    // Step 1: Strip markdown heading markers (### / ## / #)
    text = text.replace(/^#{1,3}\s+/gm, '');
    // Step 2: Strip LLM monologue lines
    text = text.replace(/^(数据有些乱码|我来生成推送消息|好的，|让我来|我先|嗯，).*$/gm, '');
    // Step 2b: Strip leaked watchdog condition/trigger expressions
    text = text.replace(/^.*\b(?:in|not in)\s*\([^)]+\).*$/gm, '');
    text = text.replace(/^(?:告诉|通知|提醒)(?:用户|小明|他).*$/gm, '');
    // Step 3: Collapse blank lines left by stripping
    text = text.replace(/\n{3,}/g, '\n\n');
    text = text.replace(/^\n+/, '');
    // Step 4: Format markdown links: [text](url) → <a>
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" style="color:#6366f1">$1</a>');
    // Format bare URLs → clickable links
    text = text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#6366f1">$1</a>');
    // Format sources
    text = text.replace(/\[([^\]]+)\]/g, '<span class="src-tag">[$1]</span>');
    // Format bold
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    div.innerHTML = text.replace(/\n/g, '<br>');
  } else {
    div.textContent = text;
  }
  chatBody.appendChild(div); chatBody.scrollTop = chatBody.scrollHeight;
}
function addSys(text) { addMsg(text, 'system'); }

function addTech(type, tag, text) {
  const div = document.createElement('div'); div.className = 'tech-event ' + type;
  div.innerHTML = `<span class="time">${new Date().toLocaleTimeString()}</span> <span class="tag ${tag}">${tag.toUpperCase()}</span><span class="desc">${text}</span>`;
  techEvents.appendChild(div);
  techEvents.parentElement.scrollTop = techEvents.parentElement.scrollHeight;
}

// Active watches tracking
let _watchCount = 0;
let _watchTasks = [];

function showToast(text, type) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.textContent = text;
  t.onclick = function() { t.style.animation = 'slideOut .3s ease forwards'; setTimeout(function() { t.remove(); }, 300); };
  c.appendChild(t);
  setTimeout(function() {
    if (t.parentNode) { t.style.animation = 'slideOut .3s ease forwards'; setTimeout(function() { t.remove(); }, 300); }
  }, 6000);
}

function updateWatchBadge(count, taskInfo) {
  _watchCount = count || _watchCount;
  if (taskInfo) {
    // Add/update
    var found = false;
    for (var i = 0; i < _watchTasks.length; i++) {
      if (_watchTasks[i].id === taskInfo.id) { _watchTasks[i] = taskInfo; found = true; break; }
    }
    if (!found) _watchTasks.push(taskInfo);
    // Remove triggered tasks
    if (taskInfo.status === 'triggered') {
      _watchTasks = _watchTasks.filter(function(t) { return t.id !== taskInfo.id; });
    }
  }
  _watchCount = _watchTasks.length;
  var badge = document.getElementById('watchBadge');
  var text = document.getElementById('watchBadgeText');
  if (_watchCount > 0) {
    badge.style.display = 'flex';
    badge.className = 'watch-badge';
    var names = _watchTasks.map(function(t) { return t.target_name; }).join(', ');
    text.textContent = _watchCount + ' 个监控中: ' + names;
  } else {
    badge.style.display = 'none';
  }
}

function toggleWatchDetail() {
  if (_watchTasks.length === 0) return;
  var lines = _watchTasks.map(function(t) {
    return '🔍 ' + t.target_name + ' [' + t.condition + ']';
  });
  showToast('活跃监控:\n' + lines.join('\n'));
}

function addActionCard(title, body, buttons) {
  var card = document.createElement('div');
  card.className = 'action-card';
  var html = '<div class="ac-title">' + title + '</div>';
  if (body) html += '<div class="ac-body">' + body + '</div>';
  if (buttons && buttons.length) {
    html += '<div class="ac-btns">';
    for (var i = 0; i < buttons.length; i++) {
      var b = buttons[i];
      html += '<button class="ac-btn' + (b.primary ? ' primary' : '') + '" onclick="' + b.action + '">' + b.label + '</button>';
    }
    html += '</div>';
  }
  card.innerHTML = html;
  chatBody.appendChild(card);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function ask(msg) {
  msg = msg || input.value.trim();
  if (!msg) return;
  addMsg(msg, 'user'); input.value = ''; showTyping();
  sendBtn.disabled = true;

  fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: msg, session_id: SID})
  }).then(r => r.json()).then(d => {
    hideTyping(); sendBtn.disabled = false;
    if (d.ok) addMsg(d.reply, 'agent');
    else addSys('出错了: ' + (d.error || ''));
  }).catch(e => {
    hideTyping(); sendBtn.disabled = false;
    addSys('网络错误，请确认服务已启动');
  });
}

// SSE tech panel
const evt = new EventSource('/api/events');
evt.onmessage = function(e) {
  if (!e.data) return;
  try {
    const d = JSON.parse(e.data);
    if (d.type === 'thinking') addTech('thinking', 'th', d.data.message);
    else if (d.type === 'tool_call') addTech('tool_call', 'tc', d.data.tool + '(' + JSON.stringify(d.data.args).substring(0,80) + ')');
    else if (d.type === 'tool_result') addTech('tool_result', 'tr', d.data.tool + ': ' + JSON.stringify(d.data.result).substring(0,120));
    else if (d.type === 'reply') addTech('reply', 'rp', 'Agent 已生成回复');
    else if (d.type === 'error') addTech('error', 'er', d.data.message);
    // Watch events
    else if (d.type === 'watch_created') {
      addTech('watch_created', 'wc', '监控已创建: ' + d.data.target_name + ' [' + d.data.condition + ']');
      updateWatchBadge(0, {id: d.data.task_id, target_name: d.data.target_name, condition: d.data.condition, status: 'active'});
    }
    else if (d.type === 'watch_triggered_raw') {
      addTech('watch_triggered_raw', 'wa', '监控条件满足: ' + d.data.target_name + ' → 触发LLM推理...');
    }
    else if (d.type === 'watch_triggered') {
      addTech('watch_triggered', 'wt', '监控触发完成: ' + d.data.target_name);
      showToast('🔔 ' + d.data.target_name + ' 监控触发！');
      if (d.data.reply) {
        addMsg(d.data.reply, 'agent');
      }
      updateWatchBadge(0, {id: d.data.task_id, target_name: d.data.target_name, condition: d.data.condition, status: 'triggered'});
    }
    else if (d.type === 'heartbeat_meal') addTech('thinking', 'th', d.data.message);
    else if (d.type === 'heartbeat_weather') addTech('thinking', 'th', d.data.message);
  } catch(_){}
};
</script>
</body>
</html>
