apiVersion: apps/v1
kind: Deployment
metadata:
  name: suixing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: suixing
  template:
    metadata:
      labels:
        app: suixing
    spec:
      containers:
        - name: suixing
          image: docker.io/misseddd/suixing:latest
          ports:
            - containerPort: 8010
---
apiVersion: v1
kind: Service
metadata:
  name: suixing
spec:
  selector:
    app: suixing
  ports:
    - port: 8010
      targetPort: 8010
