apiVersion: apps/v1
kind: Deployment
metadata:
  name: suixing
  labels:
    app: suixing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: suixing
  template:
    metadata:
      labels:
        app: suixing
    spec:
      containers:
        - name: suixing
          image: docker.io/misseddd/suixing:latest
          ports:
            - containerPort: 8010
          env:
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: suixing-secret
                  key: DEEPSEEK_API_KEY
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8010"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8010
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: suixing
  labels:
    app: suixing
spec:
  selector:
    app: suixing
  ports:
    - port: 8010
      targetPort: 8010
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: suixing
  labels:
    app: suixing
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: suixing.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: suixing
                port:
                  number: 8010
---
apiVersion: v1
kind: Secret
metadata:
  name: suixing-secret
  labels:
    app: suixing
type: Opaque
stringData:
  DEEPSEEK_API_KEY: "sk-your-key-here"
